databases:
  - name: avangarda-db
    plan: starter
    databaseName: media
    user: media

services:
  - type: web
    name: avangarda-cms
    runtime: node
    plan: starter
    rootDir: apps/cms
    buildCommand: npm install && npm run build
    startCommand: npm run start
    disk:
      name: avangarda-uploads
      mountPath: /opt/render/project/src/apps/cms/public/uploads
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1337
      - key: PUBLIC_URL
        sync: false
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_HOST
        fromDatabase:
          name: avangarda-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: avangarda-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: avangarda-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: avangarda-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: avangarda-db
          property: password
      - key: DATABASE_SSL
        value: true
